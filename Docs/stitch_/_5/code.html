<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Not rendered for Transactional Sign-up flow as per mandate -->
<main class="flex-grow flex items-center justify-center p-6 md:p-12 relative overflow-hidden">
<!-- Background Accents (Intentional Asymmetry) -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10">

<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="savings">savings</span>
<div class="text-2xl font-bold text-[#0060ad] dark:text-[#9ac3ff] tracking-tight font-headline">こどちょ</div>
</div>
<h1 class="text-5xl font-extrabold font-headline leading-[1.1] text-on-surface">
                    家族の未来を、<br/>
<span class="text-primary">もっと自由に、</span><br/>
                    美しく。
                </h1>
<p class="text-lg text-on-surface-variant leading-relaxed max-w-md">
                    信頼（Shinrai）を築くためのデジタル・エアールーム。
                    銀行のような堅実さと、家族の思い出を綴るスクラップブックのような温かさを。
                </p>
<div class="pt-8">
<div class="bg-surface-container-low p-6 rounded-xl border-l-4 border-secondary">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-full overflow-hidden shrink-0">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a Japanese woman smiling gently in warm natural lighting, high-end editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCY_vmNeqVActKtosYTqIQcoGEW71QjsJtgAJX6900qMkE_BO8S1Fz4iKKpt6Sr7_f2SgG_a3SDyi7NFDlX7rQWLeBa7a3RDAoar9uQ_BEUswEIlzAOJvzdSs-HHcVwuAOicEsvUnnMvonNWG4wCAoAa5VLG0AtVEiVLDMChaFXFJWIuwTHYPO636D17jDGEMlK2JG20WNfX-anktuRVrXiPmuQ84BdnvVM-auXuAjWEFYKp3-rOpf9Xm5ZzbSsl9JH1cRIydpXP68"/>
</div>
<p class="italic text-on-surface-variant font-medium">
                                「子供の教育資金が、毎日少しずつ形になっていくのが分かって安心します。」
                                <span class="block text-sm font-bold text-on-surface not-italic mt-1">— 佐藤 美咲様</span>
</p>
</div>
</div>
</div>
</div>
<!-- Sign Up Form Canvas (The Sanctuary) -->
<div class="w-full max-w-md mx-auto lg:mx-0">
<div class="bg-surface-container-lowest p-8 md:p-12 rounded-[2rem] shadow-[0_24px_48px_rgba(23,51,85,0.06)] backdrop-blur-xl border border-white/40">
<!-- Mobile Logo (Suppress on Desktop) -->
<div class="lg:hidden mb-8 flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="savings">savings</span>
<div class="text-2xl font-bold text-[#0060ad] dark:text-[#9ac3ff] tracking-tight font-headline">こどちょ</div>
</div>
<div class="mb-10 text-center lg:text-left">
<h2 class="text-2xl font-bold font-headline mb-2">新規登録</h2>
<p class="text-on-surface-variant text-sm">家族で使い始めるための初期設定</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">メールアドレス</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" id="email" placeholder="example@family.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="password">パスワード</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" id="password" placeholder="8文字以上の英数字" type="password"/>
</div>
</div>
<!-- Terms of Service Agreement -->
<div class="flex items-start space-x-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 border-none bg-surface-container-highest rounded-lg text-primary focus:ring-primary cursor-pointer transition-colors" id="terms" type="checkbox"/>
</div>
<div class="text-sm">
<label class="text-on-surface-variant leading-relaxed" for="terms">
<a class="text-primary hover:underline font-semibold" href="#">利用規約</a>と
                                    <a class="text-primary hover:underline font-semibold" href="#">プライバシーポリシー</a>に同意します。
                                </label>
</div>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:bg-primary-dim active:scale-95 transition-all duration-300 flex items-center justify-center space-x-2" type="submit">
<span>家族の口座を開設する</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="my-8 flex items-center space-x-4">
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
<span class="text-xs font-bold text-outline uppercase tracking-tighter">または</span>
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-3 px-4 bg-surface rounded-full border border-outline-variant/30 hover:bg-surface-container-low transition-colors duration-300">

<span class="text-sm font-medium">Google</span>
</button>

</p>
