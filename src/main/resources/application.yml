spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kodoucho}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope:
              - email
              - profile
  thymeleaf:
    cache: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  email-verification:
    # テスト時の送付先上書き。空文字にするとユーザーの実際のメールアドレスに送付
    override-to: ${EMAIL_VERIFICATION_OVERRIDE_TO:test@example.com}
    # 再認証が必要になるまでの日数
    required-days: ${EMAIL_VERIFICATION_REQUIRED_DAYS:7}
    # 認証メールのリンクベースURL
    base-url: ${APP_BASE_URL:http://localhost:8080}
    # トークン有効期限（時間）
    token-expiry-hours: 24

server:
  port: 8080
