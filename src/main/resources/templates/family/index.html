<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('家族メンバー')}"></head>
<body class="app-page font-sans">

<div th:replace="~{layout/nav :: navbar('family', ${user})}"></div>

<main class="max-w-7xl mx-auto px-4 md:px-6 py-6">

  <!-- ページヘッダー -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="font-display text-2xl font-bold text-on-surface">Family Members</h1>
      <p class="text-on-surface/60 text-sm mt-1">子供の貯蓄を管理しよう</p>
    </div>
    <a th:href="@{/children/new}"
       class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-primary text-on-primary font-semibold text-sm hover:bg-primary-dim transition-colors"
       sec:authorize="hasRole('PARENT')">
      <span class="material-symbols-rounded" style="font-size:16px;">add</span>
      子供を追加
    </a>
  </div>

  <!-- 子供がいない場合 -->
  <div th:if="${children.isEmpty()}"
       class="bg-surface-container-lowest rounded-3xl p-12 text-center card-shadow">
    <span class="material-symbols-rounded text-primary/30 block mb-4" style="font-size:64px;">child_care</span>
    <h2 class="font-display text-xl font-bold text-on-surface mb-2">子供を登録してはじめましょう</h2>
    <p class="text-on-surface/60 text-sm mb-6">子供を追加すると貯蓄の管理を開始できます</p>
    <a th:href="@{/children/new}"
       class="inline-flex items-center gap-2 px-8 py-3 rounded-full bg-primary text-on-primary font-semibold hover:bg-primary-dim transition-colors"
       sec:authorize="hasRole('PARENT')">
      <span class="material-symbols-rounded" style="font-size:18px;">add</span>
      最初の子供を追加
    </a>
  </div>

  <!-- ベントグリッドレイアウト -->
  <div th:unless="${children.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">

    <div th:each="child, iterStat : ${children}"
         th:classappend="${iterStat.index == 0 and children.size() > 2} ? 'md:col-span-2' : ''"
         class="bg-surface-container-lowest rounded-3xl p-6 card-shadow hover:shadow-lg transition-shadow">

      <!-- カードヘッダー -->
      <div class="flex items-start justify-between mb-5">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl"
               th:style="'background-color:' + ${child.themeColor} + '22;'">
            <span th:text="${child.avatar}">🐣</span>
          </div>
          <div>
            <h2 class="font-display text-xl font-bold text-on-surface" th:text="${child.name}">名前</h2>
            <span th:if="${gradeLabels[child.id] != null and !gradeLabels[child.id].isEmpty()}"
                  class="inline-block text-xs font-medium px-2.5 py-0.5 rounded-full bg-surface-container-low text-on-surface/70 mt-1"
                  th:text="${gradeLabels[child.id]}">学年</span>
          </div>
        </div>

        <!-- 編集ボタン -->
        <div class="flex items-center gap-1" sec:authorize="hasRole('PARENT')">
          <a th:href="@{/children/{id}/edit(id=${child.id})}"
             class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface/50">
            <span class="material-symbols-rounded" style="font-size:16px;">edit</span>
          </a>
          <form th:action="@{/children/{id}/delete(id=${child.id})}" method="post" class="m-0"
                onsubmit="return confirm('本当に削除しますか？この操作は元に戻せません。')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50 transition-colors text-on-surface/50 hover:text-error">
              <span class="material-symbols-rounded" style="font-size:16px;">delete</span>
            </button>
          </form>
        </div>
      </div>

      <!-- 残高 -->
      <div class="bg-surface-container-low rounded-2xl p-4 mb-4">
        <p class="text-xs text-on-surface/50 mb-1">現在の残高</p>
        <p class="font-display text-3xl font-bold text-on-surface">
          ¥<span th:text="${#numbers.formatInteger(balances[child.id], 0, 'COMMA')}">0</span>
        </p>
      </div>

      <!-- アクションボタン -->
      <div class="flex gap-2">
        <a th:href="@{/children/{id}/transactions/new(id=${child.id}, type='income')}"
           class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-full bg-secondary-container text-on-surface text-sm font-semibold hover:opacity-80 transition-opacity"
           sec:authorize="hasAnyRole('PARENT','PARTNER')">
          <span class="material-symbols-rounded" style="font-size:16px;">savings</span>
          今すぐ入金
        </a>
        <a th:href="@{/children/{id}(id=${child.id})}"
           class="flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-full bg-primary text-on-primary text-sm font-semibold hover:bg-primary-dim transition-colors">
          <span class="material-symbols-rounded" style="font-size:16px;">open_in_new</span>
          詳細を見る
        </a>
      </div>
    </div>

  </div>

  <!-- 家族連携バナー -->
  <div class="mt-6 bg-surface-container-highest rounded-2xl p-5 flex items-center justify-between gap-4 card-shadow"
       sec:authorize="hasRole('PARENT')">
    <div class="flex items-center gap-3">
      <span class="material-symbols-rounded text-primary" style="font-size:28px;">share</span>
      <div>
        <p class="font-semibold text-on-surface">家族と共有しよう</p>
        <p class="text-xs text-on-surface/60">パートナーや祖父母を招待して一緒に管理できます</p>
      </div>
    </div>
    <a th:href="@{/family/sharing}"
       class="flex-shrink-0 flex items-center gap-1.5 px-4 py-2 rounded-full bg-primary text-on-primary text-sm font-semibold hover:bg-primary-dim transition-colors">
      招待する
      <span class="material-symbols-rounded" style="font-size:14px;">chevron_right</span>
    </a>
  </div>

</main>

</body>
</html>
