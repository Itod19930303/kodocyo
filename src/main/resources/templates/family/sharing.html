<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('家族情報連携')}"></head>
<body class="app-page font-sans">

<div th:replace="~{layout/nav :: navbar('settings', ${user})}"></div>

<main class="max-w-4xl mx-auto px-4 md:px-6 py-6">

  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#eff3ff;">
      <span class="material-symbols-rounded text-primary" style="font-size:22px;">group_add</span>
    </div>
    <div>
      <h1 class="font-display font-bold text-2xl" style="color:#173355;">家族情報連携</h1>
      <p class="text-sm" style="color:#173355; opacity:0.6;">パートナーや祖父母を招待して家族で共有する</p>
    </div>
  </div>

  <!-- 成功メッセージ -->
  <div th:if="${successMessage}" class="mb-6 p-4 rounded-2xl text-sm font-medium" style="background:#b1fde6; color:#1a6b59;"
       th:text="${successMessage}"></div>

  <div class="grid md:grid-cols-5 gap-6">

    <!-- 左: 招待フォーム -->
    <div class="md:col-span-2">
      <div class="bg-surface-container-lowest rounded-3xl p-6 card-shadow">
        <h2 class="font-display font-bold text-base mb-5" style="color:#173355;">
          <span class="material-symbols-rounded mr-1" style="font-size:18px; vertical-align:middle;">send</span>
          新しく招待する
        </h2>
        <form th:action="@{/family/sharing/invite}" th:object="${inviteForm}" method="post" class="space-y-4">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div>
            <label class="block text-xs font-medium mb-1.5" style="color:#173355;">メールアドレス</label>
            <input type="email" th:field="*{email}" required
                   class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
                   style="background:#eff3ff; color:#173355;" placeholder="example@email.com">
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-xs mt-1" style="color:#ac3434;"></p>
          </div>
          <div>
            <label class="block text-xs font-medium mb-2" style="color:#173355;">役割</label>
            <div class="flex gap-2 flex-wrap" id="roleChips">
              <button type="button" class="chip selected" onclick="selectChip(this,'roleInput','PARTNER')">パートナー</button>
              <button type="button" class="chip" onclick="selectChip(this,'roleInput','GRANDPARENT')">祖父母</button>
            </div>
            <input type="hidden" th:field="*{shareRole}" id="roleInput" value="PARTNER">
            <p th:if="${#fields.hasErrors('shareRole')}" th:errors="*{shareRole}" class="text-xs mt-1" style="color:#ac3434;"></p>
          </div>
          <div>
            <label class="block text-xs font-medium mb-2" style="color:#173355;">権限</label>
            <div class="flex gap-2 flex-wrap" id="permChips">
              <button type="button" class="chip selected" onclick="selectChip(this,'permInput','VIEW_ONLY')">閲覧のみ</button>
              <button type="button" class="chip" onclick="selectChip(this,'permInput','EDIT')">編集・管理可</button>
            </div>
            <input type="hidden" th:field="*{permission}" id="permInput" value="VIEW_ONLY">
            <p th:if="${#fields.hasErrors('permission')}" th:errors="*{permission}" class="text-xs mt-1" style="color:#ac3434;"></p>
          </div>
          <button type="submit" class="w-full py-3 rounded-full text-sm font-semibold transition-colors"
                  style="background:#0060ad; color:#f8f8ff;">
            招待URLを発行する
          </button>
        </form>

        <!-- 招待URL表示 -->
        <div th:if="${inviteToken}" class="mt-5 p-4 rounded-2xl" style="background:#eff3ff;">
          <p class="text-xs font-medium mb-2" style="color:#173355;">招待URL（コピーして共有してください）</p>
          <div class="flex gap-2">
            <input type="text" id="inviteUrl" readonly
                   th:value="${'http://localhost:8080/family/sharing/accept/' + inviteToken}"
                   class="flex-1 px-3 py-2 rounded-xl text-xs outline-none"
                   style="background:#ffffff; color:#173355;">
            <button onclick="copyUrl()" class="px-3 py-2 rounded-xl text-xs font-semibold transition-colors"
                    style="background:#0060ad; color:#f8f8ff;">
              <span class="material-symbols-rounded" style="font-size:14px;">content_copy</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 右: 共有一覧 -->
    <div class="md:col-span-3 space-y-4">

      <!-- 共有中 -->
      <div class="bg-surface-container-lowest rounded-3xl p-6 card-shadow">
        <h2 class="font-display font-bold text-base mb-4" style="color:#173355;">
          <span class="material-symbols-rounded mr-1" style="font-size:18px; vertical-align:middle;">people</span>
          共有中のメンバー
        </h2>

        <div th:if="${shares.empty}" class="py-6 text-center text-sm" style="color:#173355; opacity:0.5;">
          まだ招待したメンバーはいません
        </div>

        <div class="space-y-3">
          <div th:each="share : ${shares}" class="flex items-center justify-between py-3 px-4 rounded-2xl"
               style="background:#f8f9ff;">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-full flex items-center justify-center"
                   th:style="'background:' + (#strings.equals(share.shareRole,'PARTNER') ? '#b1fde6' : '#d4e3ff') + ';'">
                <span class="material-symbols-rounded" style="font-size:18px;"
                      th:text="${share.shareRole == 'PARTNER' ? 'favorite' : 'elderly'}"></span>
              </div>
              <div>
                <p class="text-sm font-medium" th:text="${share.invitedEmail}" style="color:#173355;"></p>
                <div class="flex items-center gap-2 mt-0.5">
                  <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                        th:text="${share.shareRole == 'PARTNER' ? 'パートナー' : '祖父母'}"
                        style="background:#d4e3ff; color:#0060ad;"></span>
                  <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                        th:text="${share.permission == 'EDIT' ? '編集可' : '閲覧のみ'}"
                        style="background:#eff3ff; color:#173355;"></span>
                  <span class="text-xs"
                        th:text="${share.status == 'ACCEPTED' ? '参加中' : share.status == 'PENDING' ? '承諾待ち' : '無効'}"
                        th:style="${share.status == 'ACCEPTED' ? 'color:#1a6b59;' : share.status == 'PENDING' ? 'color:#0060ad;' : 'color:#99b4dc;'}"></span>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <form th:if="${share.status == 'PENDING'}"
                    th:action="@{/family/sharing/{id}/resend(id=${share.id})}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors"
                        style="background:#eff3ff; color:#0060ad;">再送信</button>
              </form>
              <form th:if="${share.status != 'REVOKED'}"
                    th:action="@{/family/sharing/{id}/revoke(id=${share.id})}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit"
                        onclick="return confirm('この共有を解除しますか？')"
                        class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors"
                        style="background:#fee2e2; color:#ac3434;">解除</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- 使い方ガイド -->
      <div class="rounded-3xl p-6" style="background:#eff3ff;">
        <h3 class="font-display font-semibold text-sm mb-3" style="color:#173355;">
          <span class="material-symbols-rounded mr-1" style="font-size:16px; vertical-align:middle;">info</span>
          招待の使い方
        </h3>
        <ol class="space-y-2 text-sm" style="color:#173355; opacity:0.8;">
          <li class="flex gap-2"><span class="font-bold text-primary">1.</span> 招待したい人のメールアドレスと役割・権限を設定する</li>
          <li class="flex gap-2"><span class="font-bold text-primary">2.</span> 「招待URLを発行する」ボタンを押す</li>
          <li class="flex gap-2"><span class="font-bold text-primary">3.</span> 発行されたURLを相手に送る（コピー&ペースト）</li>
          <li class="flex gap-2"><span class="font-bold text-primary">4.</span> 相手がURLを開いてログインすると連携完了</li>
        </ol>
      </div>
    </div>

  </div>
</main>

</body>
</html>
