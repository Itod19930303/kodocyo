<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招待の承諾 - こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Manrope:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad',
            'on-primary': '#f8f8ff',
            surface: '#f8f9ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-style: normal; font-size: 20px; line-height: 1; letter-spacing: normal; text-transform: none; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
    body { background-color: #f8f9ff; color: #173355; }
  </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md text-center">
    <div class="bg-surface-container-lowest rounded-3xl p-10" style="box-shadow: 0 8px 48px rgba(23,51,85,0.10);">

      <!-- ロゴ -->
      <div class="flex items-center justify-center gap-2 mb-8">
        <span class="material-symbols-rounded text-primary" style="font-size:32px;">savings</span>
        <span class="font-display font-bold text-2xl text-primary">こどちょ</span>
      </div>

      <!-- 成功 -->
      <div th:if="${message}">
        <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6" style="background:#b1fde6;">
          <span class="material-symbols-rounded" style="font-size:40px; color:#1a6b59;">check_circle</span>
        </div>
        <h1 class="font-display font-bold text-2xl mb-3" style="color:#173355;" th:text="${message}">招待を承諾しました</h1>
        <p class="text-sm mb-8" style="color:#173355; opacity:0.7;">
          家族の貯蓄情報を閲覧できるようになりました。<br>ダッシュボードで確認してみましょう。
        </p>
        <a th:href="@{/dashboard}"
           class="inline-flex items-center gap-2 px-8 py-3 rounded-full font-semibold text-sm transition-colors"
           style="background:#0060ad; color:#f8f8ff;">
          <span class="material-symbols-rounded" style="font-size:16px;">dashboard</span>
          ダッシュボードへ
        </a>
      </div>

      <!-- エラー -->
      <div th:if="${error}">
        <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6" style="background:#fee2e2;">
          <span class="material-symbols-rounded" style="font-size:40px; color:#ac3434;">error</span>
        </div>
        <h1 class="font-display font-bold text-2xl mb-3" style="color:#173355;">招待URLが無効です</h1>
        <p class="text-sm mb-2" style="color:#ac3434; opacity:0.9;" th:text="${error}"></p>
        <p class="text-sm mb-8" style="color:#173355; opacity:0.7;">
          URLの有効期限が切れているか、すでに使用済みの可能性があります。<br>
          招待者に再送信を依頼してください。
        </p>
        <a th:href="@{/dashboard}"
           class="inline-flex items-center gap-2 px-8 py-3 rounded-full font-semibold text-sm transition-colors"
           style="background:#eff3ff; color:#173355;">
          ダッシュボードへ
        </a>
      </div>

    </div>
  </div>
</body>
</html>
