<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- PC グローバルナビ + スマホ ボトムナビ フラグメント -->
<div th:fragment="navbar(currentPage, user)">

  <!-- PC ナビゲーション -->
  <nav class="hidden md:flex items-center justify-between px-6 py-3 bg-surface-container-lowest shadow-sm sticky top-0 z-50">
    <!-- ロゴ -->
    <a th:href="@{/dashboard}" class="flex items-center gap-2 no-underline">
      <span class="material-symbols-rounded text-primary" style="font-size:28px;">savings</span>
      <span class="font-display font-bold text-xl text-primary">こどちょ</span>
    </a>

    <!-- 中央ナビリンク -->
    <div class="flex items-center gap-1">
      <a th:href="@{/dashboard}"
         th:classappend="${currentPage == 'dashboard'} ? 'bg-surface-container-low text-primary font-semibold' : 'text-on-surface hover:bg-surface-container-low'"
         class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-medium transition-colors">
        <span class="material-symbols-rounded" style="font-size:18px;">dashboard</span>
        ダッシュボード
      </a>
      <a th:href="@{/family}"
         th:classappend="${currentPage == 'family'} ? 'bg-surface-container-low text-primary font-semibold' : 'text-on-surface hover:bg-surface-container-low'"
         class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-medium transition-colors">
        <span class="material-symbols-rounded" style="font-size:18px;">group</span>
        家族
      </a>
      <a th:href="@{/family/sharing}"
         th:classappend="${currentPage == 'settings'} ? 'bg-surface-container-low text-primary font-semibold' : 'text-on-surface hover:bg-surface-container-low'"
         class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-medium transition-colors"
         sec:authorize="hasRole('PARENT')">
        <span class="material-symbols-rounded" style="font-size:18px;">share</span>
        設定
      </a>
    </div>

    <!-- 右側アクション -->
    <div class="flex items-center gap-2">
      <a th:href="@{/children/new}"
         class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold bg-surface-container-low text-on-surface hover:bg-surface-container-highest transition-colors"
         sec:authorize="hasRole('PARENT')">
        <span class="material-symbols-rounded" style="font-size:16px;">child_care</span>
        子供を追加
      </a>
      <!-- 新規入力ボタン（子供がいる場合） -->
      <button id="quickAddBtn"
              onclick="document.getElementById('quickAddMenu').classList.toggle('hidden')"
              class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold bg-primary text-on-primary hover:bg-primary-dim transition-colors relative"
              sec:authorize="hasAnyRole('PARENT','PARTNER')">
        <span class="material-symbols-rounded" style="font-size:16px;">add</span>
        新規入力
      </button>
      <!-- ユーザーメニュー -->
      <div class="relative">
        <button onclick="document.getElementById('userMenu').classList.toggle('hidden')"
                class="flex items-center gap-2 px-3 py-2 rounded-full text-sm text-on-surface hover:bg-surface-container-low transition-colors">
          <span class="material-symbols-rounded" style="font-size:22px;">account_circle</span>
          <span th:text="${user != null ? user.name : 'ユーザー'}" class="hidden lg:inline max-w-24 truncate"></span>
        </button>
        <div id="userMenu" class="hidden absolute right-0 top-12 w-48 bg-surface-container-lowest rounded-2xl shadow-lg py-2 z-50">
          <div class="px-4 py-2 text-xs text-on-surface/60 border-b border-surface-container-low" th:text="${user != null ? user.email : ''}"></div>
          <a th:href="@{/mypage}" class="w-full text-left px-4 py-2 text-sm text-on-surface hover:bg-surface-container-low transition-colors flex items-center gap-2">
            <span class="material-symbols-rounded" style="font-size:16px;">person</span>
            マイページ
          </a>
          <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-error hover:bg-surface-container-low transition-colors flex items-center gap-2">
              <span class="material-symbols-rounded" style="font-size:16px;">logout</span>
              ログアウト
            </button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  <!-- スマホ ボトムナビゲーション -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-surface-container-lowest z-50" style="box-shadow: 0 -2px 16px rgba(0,96,173,0.08);">
    <div class="flex items-center justify-around py-2">
      <a th:href="@{/dashboard}"
         th:classappend="${currentPage == 'dashboard'} ? 'text-primary' : 'text-on-surface/50'"
         class="flex flex-col items-center gap-0.5 px-4 py-1 min-w-0">
        <span class="material-symbols-rounded" style="font-size:24px;">dashboard</span>
        <span class="text-xs font-medium">ホーム</span>
      </a>
      <a th:href="@{/family}"
         th:classappend="${currentPage == 'family'} ? 'text-primary' : 'text-on-surface/50'"
         class="flex flex-col items-center gap-0.5 px-4 py-1 min-w-0">
        <span class="material-symbols-rounded" style="font-size:24px;">savings</span>
        <span class="text-xs font-medium">貯金箱</span>
      </a>
      <a th:href="@{/family}"
         th:classappend="${currentPage == 'members'} ? 'text-primary' : 'text-on-surface/50'"
         class="flex flex-col items-center gap-0.5 px-4 py-1 min-w-0">
        <span class="material-symbols-rounded" style="font-size:24px;">group</span>
        <span class="text-xs font-medium">家族</span>
      </a>
      <a th:href="@{/mypage}"
         th:classappend="${currentPage == 'mypage'} ? 'text-primary' : 'text-on-surface/50'"
         class="flex flex-col items-center gap-0.5 px-4 py-1 min-w-0">
        <span class="material-symbols-rounded" style="font-size:24px;">person</span>
        <span class="text-xs font-medium">マイページ</span>
      </a>
    </div>
  </nav>

</div>

</body>
</html>
