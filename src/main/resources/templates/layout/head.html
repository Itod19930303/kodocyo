<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' - こどちょ'">こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <script th:src="@{/js/app.js}" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad', 'primary-dim': '#005498',
            'on-primary': '#f8f8ff', surface: '#f8f9ff',
            'surface-container-low': '#eff3ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
            'secondary-container': '#b1fde6',
            'tertiary-container': '#feb246',
            error: '#ac3434',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body><!-- fragment only --></body>
</html>
