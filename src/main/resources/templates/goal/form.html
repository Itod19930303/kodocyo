<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="(${goal} != null ? '目標を編集' : '目標を追加') + ' - こどちょ'">こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Manrope:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad', 'primary-dim': '#005498',
            'on-primary': '#f8f8ff', surface: '#f8f9ff',
            'surface-container-low': '#eff3ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
            'secondary-container': '#b1fde6',
            'tertiary-container': '#feb246',
            error: '#ac3434',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-style: normal; font-size: 20px; line-height: 1; letter-spacing: normal; text-transform: none; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
    body { padding-bottom: 72px; background-color: #f8f9ff; color: #173355; }
    @media (min-width: 768px) { body { padding-bottom: 0; } }
    .card-shadow { box-shadow: 0 2px 16px rgba(0,96,173,0.08); }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s; background: #eff3ff; color: #173355; }
    .chip.selected { background: #0060ad; color: #f8f8ff; }
    .emoji-btn { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; background: #eff3ff; transition: all 0.15s; }
    .emoji-btn.selected { background: #d4e3ff; outline: 2px solid #0060ad; }
  </style>
</head>
<body class="font-sans">

<div th:replace="~{layout/nav :: navbar('family', ${user})}"></div>

<main class="max-w-2xl mx-auto px-4 md:px-6 py-6">

  <!-- 戻るリンク -->
  <a th:href="@{/children/{id}(id=${child.id})}" class="inline-flex items-center gap-1 text-sm text-on-surface/60 hover:text-primary transition-colors mb-5">
    <span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span>
    <span th:text="${child.name} + ' に戻る'"></span>
  </a>

  <div class="bg-surface-container-lowest rounded-3xl p-6 md:p-8 card-shadow">
    <!-- ヘッダー -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#eff3ff;">
        <span class="material-symbols-rounded text-primary" style="font-size:22px;">flag</span>
      </div>
      <div>
        <h1 class="font-display font-bold text-xl" style="color:#173355;"
            th:text="${goal} != null ? '目標を編集' : '目標を追加'">目標を追加</h1>
        <p class="text-sm" style="color:#173355; opacity:0.6;" th:text="${child.name} + ' の目標設定'"></p>
      </div>
    </div>

    <!-- 新規作成フォーム -->
    <form th:if="${goal == null}"
          th:action="@{/children/{id}/goals(id=${child.id})}"
          th:object="${goalForm}" method="post" class="space-y-6">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <!-- 絵文字選択 -->
      <div>
        <label class="block text-sm font-medium mb-3" style="color:#173355;">アイコン</label>
        <div class="flex flex-wrap gap-2" id="emojiButtons">
          <button type="button" th:each="e : ${ {'🎯','🏠','📚','✈️','🎮','🎵','⚽','🎂','💎','🌟'} }"
                  th:classappend="${goalForm.emoji == e} ? 'selected' : ''"
                  class="emoji-btn" th:text="${e}"
                  th:onclick="'selectEmoji(this, \'' + ${e} + '\')'"></button>
        </div>
        <input type="hidden" th:field="*{emoji}" id="emojiInput">
      </div>

      <!-- 目標タイトル -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">目標タイトル <span style="color:#ac3434;">*</span></label>
        <input type="text" th:field="*{name}" maxlength="30" required
               class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
               style="background:#eff3ff; color:#173355;" placeholder="例：大学の入学資金">
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs mt-1" style="color:#ac3434;"></p>
      </div>

      <!-- 貯蓄の目的 -->
      <div>
        <label class="block text-sm font-medium mb-3" style="color:#173355;">貯蓄の目的</label>
        <div class="flex flex-wrap gap-2" id="purposeChips">
          <button type="button" th:each="p : ${ {'教育','習い事','趣味','お祝い'} }"
                  th:classappend="${goalForm.purposeCategory == p} ? 'selected' : ''"
                  class="chip" th:text="${p}"
                  th:onclick="'selectPurpose(this, \'' + ${p} + '\')'"></button>
        </div>
        <input type="hidden" th:field="*{purposeCategory}" id="purposeInput">
      </div>

      <!-- 目標金額 -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">目標金額 <span style="color:#ac3434;">*</span></label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-semibold" style="color:#99b4dc;">¥</span>
          <input type="number" th:field="*{targetAmount}" min="1" required
                 class="w-full pl-8 pr-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
                 style="background:#eff3ff; color:#173355;" placeholder="0">
        </div>
        <p th:if="${#fields.hasErrors('targetAmount')}" th:errors="*{targetAmount}" class="text-xs mt-1" style="color:#ac3434;"></p>
      </div>

      <!-- 目標達成日 -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">目標達成日（任意）</label>
        <input type="date" th:field="*{targetDate}"
               class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
               style="background:#eff3ff; color:#173355;">
      </div>

      <!-- メッセージ -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">お子様へのメッセージ（任意）</label>
        <textarea th:field="*{message}" maxlength="200" rows="3"
                  class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary resize-none"
                  style="background:#eff3ff; color:#173355;" placeholder="一緒に頑張ろうね！"></textarea>
        <p th:if="${#fields.hasErrors('message')}" th:errors="*{message}" class="text-xs mt-1" style="color:#ac3434;"></p>
      </div>

      <div class="flex gap-3 pt-2">
        <a th:href="@{/children/{id}(id=${child.id})}"
           class="flex-1 py-3 rounded-full text-center text-sm font-semibold transition-colors"
           style="background:#eff3ff; color:#173355;">キャンセル</a>
        <button type="submit" class="flex-1 py-3 rounded-full text-sm font-semibold transition-colors"
                style="background:#0060ad; color:#f8f8ff;">目標を保存する</button>
      </div>
    </form>

    <!-- 編集フォーム -->
    <form th:if="${goal != null}"
          th:action="@{/children/{id}/goals/{goalId}(id=${child.id}, goalId=${goal.id})}"
          th:object="${goalForm}" method="post" class="space-y-6">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <!-- 絵文字選択 -->
      <div>
        <label class="block text-sm font-medium mb-3" style="color:#173355;">アイコン</label>
        <div class="flex flex-wrap gap-2" id="emojiButtonsEdit">
          <button type="button" th:each="e : ${ {'🎯','🏠','📚','✈️','🎮','🎵','⚽','🎂','💎','🌟'} }"
                  th:classappend="${goalForm.emoji == e} ? 'selected' : ''"
                  class="emoji-btn" th:text="${e}"
                  th:onclick="'selectEmoji(this, \'' + ${e} + '\')'"></button>
        </div>
        <input type="hidden" th:field="*{emoji}" id="emojiInput">
      </div>

      <!-- 目標タイトル -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">目標タイトル <span style="color:#ac3434;">*</span></label>
        <input type="text" th:field="*{name}" maxlength="30" required
               class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
               style="background:#eff3ff; color:#173355;" placeholder="例：大学の入学資金">
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-xs mt-1" style="color:#ac3434;"></p>
      </div>

      <!-- 貯蓄の目的 -->
      <div>
        <label class="block text-sm font-medium mb-3" style="color:#173355;">貯蓄の目的</label>
        <div class="flex flex-wrap gap-2" id="purposeChipsEdit">
          <button type="button" th:each="p : ${ {'教育','習い事','趣味','お祝い'} }"
                  th:classappend="${goalForm.purposeCategory == p} ? 'selected' : ''"
                  class="chip" th:text="${p}"
                  th:onclick="'selectPurposeEdit(this, \'' + ${p} + '\')'"></button>
        </div>
        <input type="hidden" th:field="*{purposeCategory}" id="purposeInputEdit">
      </div>

      <!-- 目標金額 -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">目標金額 <span style="color:#ac3434;">*</span></label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-semibold" style="color:#99b4dc;">¥</span>
          <input type="number" th:field="*{targetAmount}" min="1" required
                 class="w-full pl-8 pr-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
                 style="background:#eff3ff; color:#173355;" placeholder="0">
        </div>
        <p th:if="${#fields.hasErrors('targetAmount')}" th:errors="*{targetAmount}" class="text-xs mt-1" style="color:#ac3434;"></p>
      </div>

      <!-- 目標達成日 -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">目標達成日（任意）</label>
        <input type="date" th:field="*{targetDate}"
               class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
               style="background:#eff3ff; color:#173355;">
      </div>

      <!-- メッセージ -->
      <div>
        <label class="block text-sm font-medium mb-1.5" style="color:#173355;">お子様へのメッセージ（任意）</label>
        <textarea th:field="*{message}" maxlength="200" rows="3"
                  class="w-full px-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary resize-none"
                  style="background:#eff3ff; color:#173355;" placeholder="一緒に頑張ろうね！"></textarea>
        <p th:if="${#fields.hasErrors('message')}" th:errors="*{message}" class="text-xs mt-1" style="color:#ac3434;"></p>
      </div>

      <div class="flex gap-3 pt-2">
        <a th:href="@{/children/{id}(id=${child.id})}"
           class="flex-1 py-3 rounded-full text-center text-sm font-semibold transition-colors"
           style="background:#eff3ff; color:#173355;">キャンセル</a>
        <button type="submit" class="flex-1 py-3 rounded-full text-sm font-semibold transition-colors"
                style="background:#0060ad; color:#f8f8ff;">変更を保存する</button>
      </div>
    </form>

    <!-- 削除ボタン（編集時のみ） -->
    <div th:if="${goal != null}" class="mt-4 pt-4" style="border-top: 1px solid #eff3ff;">
      <form th:action="@{/children/{id}/goals/{goalId}/delete(id=${child.id}, goalId=${goal.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" onclick="return confirm('この目標を削除しますか？')"
                class="w-full py-2.5 rounded-full text-sm font-medium transition-colors"
                style="color:#ac3434; background:transparent;">
          <span class="material-symbols-rounded" style="font-size:16px; vertical-align:middle;">delete</span>
          この目標を削除する
        </button>
      </form>
    </div>
  </div>
</main>

<script>
  function selectEmoji(btn, emoji) {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('emojiInput').value = emoji;
  }
  function selectPurpose(btn, purpose) {
    const allBtns = document.querySelectorAll('#purposeChips .chip');
    const input = document.getElementById('purposeInput');
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      input.value = '';
    } else {
      allBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      input.value = purpose;
    }
  }
  function selectPurposeEdit(btn, purpose) {
    const allBtns = document.querySelectorAll('#purposeChipsEdit .chip');
    const input = document.getElementById('purposeInputEdit');
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      input.value = '';
    } else {
      allBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      input.value = purpose;
    }
  }
</script>
</body>
</html>
