<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head(${child != null} ? '子供を編集' : '子供を追加')}"></head>
<body class="app-page font-sans">

<div th:replace="~{layout/nav :: navbar('family', ${user})}"></div>

<main class="max-w-2xl mx-auto px-4 md:px-6 py-6">

  <!-- 戻るリンク -->
  <a th:href="@{/family}" class="inline-flex items-center gap-1 text-sm text-on-surface/60 hover:text-primary transition-colors mb-5">
    <span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span>
    家族メンバーに戻る
  </a>

  <h1 class="font-display text-2xl font-bold text-on-surface mb-6"
      th:text="${child != null} ? '子供の情報を編集' : '子供を追加'">子供を追加</h1>

  <!-- プレビュー -->
  <div class="flex justify-center mb-6">
    <div class="flex flex-col items-center gap-2">
      <div id="avatarPreview"
           class="w-20 h-20 rounded-3xl flex items-center justify-center text-4xl transition-all"
           style="background-color: #0060ad22;">
        <span id="avatarEmoji" th:text="${childForm.avatar != null and !childForm.avatar.isBlank() ? childForm.avatar : '🐣'}">🐣</span>
      </div>
      <p id="namePreview" class="font-display font-bold text-on-surface text-lg"
         th:text="${childForm.name != null and !childForm.name.isBlank() ? childForm.name : '名前を入力してください'}">名前を入力</p>
    </div>
  </div>

  <div class="bg-surface-container-lowest rounded-3xl p-6 card-shadow">
    <form th:action="${child != null} ? @{/children/{id}(id=${child.id})} : @{/children}"
          method="post" th:object="${childForm}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- 名前 -->
      <div class="mb-5">
        <label for="name" class="block text-xs font-semibold text-on-surface/60 mb-2">お名前 <span class="text-error">*</span></label>
        <input type="text" id="name" th:field="*{name}"
               class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface outline-none focus:ring-2 focus:ring-primary/30 transition-all"
               placeholder="例：たろう" maxlength="20"
               oninput="document.getElementById('namePreview').textContent = this.value || '名前を入力してください'">
        <p th:if="${#fields.hasErrors('name')}" class="text-xs text-error mt-1" th:errors="*{name}">エラー</p>
      </div>

      <!-- アバター絵文字選択 -->
      <div class="mb-5">
        <label class="block text-xs font-semibold text-on-surface/60 mb-2">アバター</label>
        <input type="hidden" id="avatarInput" th:field="*{avatar}"/>
        <div class="flex flex-wrap gap-2">
          <button type="button" th:each="emoji : ${ {'🐣','🐱','🐶','🐰','🐻','🦊','🐼','🐸','🦄','⭐','🌟','🌈','🌺','🍀','🎈','🚀'} }"
                  th:text="${emoji}"
                  th:classappend="${childForm.avatar == emoji} ? 'avatar-btn selected bg-surface-container-low' : 'avatar-btn bg-surface-container-low'"
                  class="w-12 h-12 rounded-2xl text-2xl flex items-center justify-center hover:bg-surface-container-highest transition-colors"
                  th:data-emoji="${emoji}"
                  onclick="selectAvatar(this.dataset.emoji)"
                  >🐣</button>
        </div>
      </div>

      <!-- 生年月日 -->
      <div class="mb-5">
        <label for="birthDate" class="block text-xs font-semibold text-on-surface/60 mb-2">生年月日</label>
        <input type="date" id="birthDate" th:field="*{birthDate}"
               class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface outline-none focus:ring-2 focus:ring-primary/30 transition-all font-medium">
        <p class="text-xs text-on-surface/40 mt-1">学年ラベルの自動計算に使用します</p>
      </div>

      <!-- テーマカラー -->
      <div class="mb-6">
        <label class="block text-xs font-semibold text-on-surface/60 mb-2">テーマカラー</label>
        <input type="hidden" id="themeColorInput" th:field="*{themeColor}"/>
        <div class="flex gap-3">
          <button type="button" th:each="color : ${ {'#0060ad','#7c3aed','#db2777','#d97706','#059669','#dc2626'} }"
                  th:style="'background-color:' + ${color} + ';'"
                  th:classappend="${childForm.themeColor == color} ? 'color-btn w-10 h-10 rounded-full transition-all' : 'color-btn w-10 h-10 rounded-full transition-all opacity-70 hover:opacity-100'"
                  th:data-color="${color}"
                  onclick="selectColor(this.dataset.color)"
                  class="w-10 h-10 rounded-full transition-all hover:scale-110"></button>
        </div>
        <p th:if="${#fields.hasErrors('themeColor')}" class="text-xs text-error mt-1" th:errors="*{themeColor}">エラー</p>
      </div>

      <!-- 送信ボタン -->
      <div class="flex gap-3">
        <a th:href="@{/family}"
           class="flex-1 flex items-center justify-center py-3 rounded-full bg-surface-container-low text-on-surface font-semibold hover:bg-surface-container-highest transition-colors">
          キャンセル
        </a>
        <button type="submit"
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-full bg-primary text-on-primary font-bold hover:bg-primary-dim transition-colors">
          <span class="material-symbols-rounded" style="font-size:18px;">check</span>
          <span th:text="${child != null} ? '変更を保存' : '追加する'">追加する</span>
        </button>
      </div>
    </form>
  </div>
</main>

<script>
  function selectAvatar(emoji) {
    document.getElementById('avatarInput').value = emoji;
    document.getElementById('avatarEmoji').textContent = emoji;
    document.querySelectorAll('.avatar-btn').forEach(btn => {
      if (btn.textContent.trim() === emoji) {
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    });
  }

  function selectColor(color) {
    document.getElementById('themeColorInput').value = color;
    document.getElementById('avatarPreview').style.backgroundColor = color + '22';
    document.querySelectorAll('.color-btn').forEach(btn => {
      if (btn.dataset.color === color) {
        btn.classList.add('selected');
        btn.style.opacity = '1';
      } else {
        btn.classList.remove('selected');
        btn.style.opacity = '0.7';
      }
    });
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${r}, ${g}, ${b})`;
  }
</script>
</body>
</html>
