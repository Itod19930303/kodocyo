<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認証エラー - こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Manrope:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad',
            'on-primary': '#f8f8ff',
            'surface': '#f8f9ff',
            'surface-container-low': '#eff3ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-size: 24px; line-height: 1; vertical-align: middle; }
  </style>
</head>
<body class="bg-surface font-sans text-on-surface min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-surface-container-lowest rounded-3xl p-10 text-center"
         style="box-shadow: 0 8px 48px rgba(23,51,85,0.10);">

      <!-- Icon -->
      <div class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center"
           style="background-color: #fee2e2;">
        <span class="material-symbols-rounded" style="color:#ac3434; font-size: 40px;">error</span>
      </div>

      <!-- Logo -->
      <div class="flex items-center justify-center gap-2 mb-6">
        <span class="material-symbols-rounded text-3xl" style="color:#0060ad;">savings</span>
        <span class="text-xl font-bold font-display" style="color:#0060ad;">こどちょ</span>
      </div>

      <h1 class="text-2xl font-bold font-display mb-2" style="color:#173355;">認証リンクが無効です</h1>
      <p class="text-sm mb-8" style="color:#173355; opacity:0.65;">
        リンクの有効期限が切れているか、すでに使用済みです。<br>
        再度ログインして認証メールを再送してください。
      </p>

      <a th:href="@{/login}"
         class="inline-flex items-center justify-center gap-2 w-full py-3 rounded-full font-semibold text-sm"
         style="background:#0060ad; color:#f8f8ff;">
        ログインページへ
      </a>
    </div>
  </div>
</body>
</html>
