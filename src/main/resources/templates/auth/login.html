<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Manrope:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad',
            'on-primary': '#f8f8ff',
            'surface': '#f8f9ff',
            'surface-container-low': '#eff3ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-size: 24px; line-height: 1; vertical-align: middle; }
  </style>
</head>
<body class="bg-surface font-sans text-on-surface min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-4xl bg-surface-container-lowest rounded-3xl overflow-hidden shadow-lg flex" style="min-height: 600px; box-shadow: 0 8px 48px rgba(23,51,85,0.10);">
    <!-- Left Panel -->
    <div class="hidden md:flex flex-col justify-between p-10 w-5/12" style="background-color: #d4e3ff;">
      <div>
        <div class="flex items-center gap-2 mb-10">
          <span class="material-symbols-rounded text-4xl" style="color:#0060ad;">savings</span>
          <span class="text-2xl font-bold font-display" style="color:#0060ad;">こどちょ</span>
        </div>
        <h2 class="text-3xl font-bold font-display leading-snug mb-4" style="color:#173355;">家族の未来を、<br>穏やかに育む。</h2>
        <p class="text-base leading-relaxed" style="color:#173355; opacity:0.75;">「信頼」という名の貯蓄体験。<br>子供の成長と共に、<br>大切な記憶を積み上げる。</p>
      </div>
      <div class="bg-white rounded-2xl p-5" style="opacity:0.9;">
        <p class="text-sm font-medium" style="color:#173355;">「毎月の記録が楽しみになりました」</p>
        <p class="text-xs mt-2" style="color:#173355; opacity:0.6;">— 山田さん、2児の親</p>
      </div>
    </div>
    <!-- Right Panel -->
    <div class="flex flex-col justify-center p-8 md:p-12 flex-1">
      <div class="flex items-center gap-2 mb-8 md:hidden">
        <span class="material-symbols-rounded text-3xl" style="color:#0060ad;">savings</span>
        <span class="text-xl font-bold font-display" style="color:#0060ad;">こどちょ</span>
      </div>
      <h1 class="text-2xl font-bold font-display mb-1" style="color:#173355;">おかえりなさい</h1>
      <p class="text-sm mb-8" style="color:#173355; opacity:0.6;">アカウントにログイン</p>

      <div th:if="${param.error}" class="mb-4 p-4 rounded-xl text-sm" style="background:#fee2e2; color:#ac3434;">
        メールアドレスまたはパスワードが正しくありません
      </div>
      <div th:if="${param.registered}" class="mb-4 p-4 rounded-xl text-sm" style="background:#dcfce7; color:#166534;">
        登録が完了しました。ログインしてください
      </div>

      <form th:action="@{/login}" method="post" class="space-y-4">
        <div th:if="${_csrf != null}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5" style="color:#173355;">メールアドレス</label>
          <div class="relative">
            <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-xl" style="color:#99b4dc;">mail</span>
            <input type="email" name="email" required autocomplete="email"
              class="w-full pl-10 pr-4 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
              style="background:#eff3ff; color:#173355;" placeholder="example@email.com">
          </div>
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-sm font-medium" style="color:#173355;">パスワード</label>
            <a href="#" class="text-xs" style="color:#0060ad;">忘れた？</a>
          </div>
          <div class="relative">
            <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-xl" style="color:#99b4dc;">lock</span>
            <input type="password" name="password" id="password" required autocomplete="current-password"
              class="w-full pl-10 pr-10 py-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary"
              style="background:#eff3ff; color:#173355;">
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2">
              <span class="material-symbols-rounded text-xl" style="color:#99b4dc;">visibility</span>
            </button>
          </div>
        </div>
        <button type="submit" class="w-full py-3 rounded-full font-semibold text-sm transition-colors"
          style="background:#0060ad; color:#f8f8ff;">
          ログインする →
        </button>
      </form>

      <div class="flex items-center my-5">
        <div class="flex-1 h-px" style="background:#d4e3ff;"></div>
        <span class="px-3 text-xs" style="color:#99b4dc;">または</span>
        <div class="flex-1 h-px" style="background:#d4e3ff;"></div>
      </div>

      <a th:href="@{/oauth2/authorization/google}"
        class="flex items-center justify-center gap-2 w-full py-3 rounded-full border text-sm font-medium transition-colors"
        style="border-color:#d4e3ff; color:#173355; background:#fff;">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google でログイン
      </a>

      <p class="text-center text-sm mt-6" style="color:#173355; opacity:0.6;">
        まだ未登録？
        <a th:href="@{/register}" style="color:#0060ad;" class="font-medium">新規登録</a>
      </p>
    </div>
  </div>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
