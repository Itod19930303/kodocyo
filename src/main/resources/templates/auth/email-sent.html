<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メール送信完了 - こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Manrope:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad',
            'on-primary': '#f8f8ff',
            'surface': '#f8f9ff',
            'surface-container-low': '#eff3ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-size: 24px; line-height: 1; vertical-align: middle; }
  </style>
</head>
<body class="bg-surface font-sans text-on-surface min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-surface-container-lowest rounded-3xl p-10 text-center"
         style="box-shadow: 0 8px 48px rgba(23,51,85,0.10);">

      <!-- Icon -->
      <div class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center"
           style="background-color: #eff3ff;">
        <span class="material-symbols-rounded" style="color:#0060ad; font-size: 40px;">mark_email_read</span>
      </div>

      <!-- Logo -->
      <div class="flex items-center justify-center gap-2 mb-6">
        <span class="material-symbols-rounded text-3xl" style="color:#0060ad;">savings</span>
        <span class="text-xl font-bold font-display" style="color:#0060ad;">こどちょ</span>
      </div>

      <h1 class="text-2xl font-bold font-display mb-2" style="color:#173355;">メールを送信しました</h1>
      <p class="text-sm mb-6" style="color:#173355; opacity:0.65;">メールに記載されているURLをクリックして認証を完了してください</p>

      <!-- Sent to -->
      <div th:if="${sentTo}" class="rounded-2xl p-4 mb-6 text-left" style="background:#eff3ff;">
        <p class="text-xs font-medium mb-1" style="color:#173355; opacity:0.6;">送付先</p>
        <p class="text-sm font-semibold break-all" style="color:#0060ad;" th:text="${sentTo}"></p>
      </div>

      <div class="rounded-2xl p-4 mb-8 text-left" style="background:#eff3ff;">
        <div class="flex gap-3 items-start">
          <span class="material-symbols-rounded text-base mt-0.5 flex-shrink-0" style="color:#99b4dc;">info</span>
          <ul class="text-xs space-y-1" style="color:#173355; opacity:0.75;">
            <li>URLの有効期限は24時間です</li>
            <li>メールが届かない場合は迷惑メールフォルダもご確認ください</li>
            <li>URLは一度のみ有効です</li>
          </ul>
        </div>
      </div>

      <a th:href="@{/login}"
         class="inline-flex items-center gap-2 text-sm font-medium"
         style="color:#0060ad;">
        <span class="material-symbols-rounded text-base">arrow_back</span>
        ログインページへ戻る
      </a>
    </div>
  </div>
</body>
</html>
