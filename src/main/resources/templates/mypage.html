<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head('マイページ')}"></head>
<body class="app-page font-sans">

<div th:replace="~{layout/nav :: navbar('mypage', ${user})}"></div>

<main class="max-w-2xl mx-auto px-4 md:px-6 py-6">

  <!-- ページヘッダー -->
  <div class="mb-6">
    <h1 class="font-display text-2xl font-bold text-on-surface">マイページ</h1>
    <p class="text-on-surface/60 text-sm mt-1">アカウント情報を確認できます</p>
  </div>

  <!-- プロフィールカード -->
  <div class="bg-surface-container-lowest rounded-3xl p-6 card-shadow mb-5">
    <div class="flex items-center gap-4 mb-6">
      <div class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center">
        <span class="material-symbols-rounded text-primary" style="font-size:36px;">account_circle</span>
      </div>
      <div>
        <p class="font-display text-xl font-bold text-on-surface" th:text="${user.name}">名前</p>
        <p class="text-sm text-on-surface/60" th:text="${user.email}">メールアドレス</p>
      </div>
    </div>

    <!-- 情報一覧 -->
    <div class="space-y-0 rounded-2xl overflow-hidden bg-surface-container-low">

      <!-- 名前 -->
      <div class="flex items-center justify-between px-4 py-3.5">
        <div class="flex items-center gap-3">
          <span class="material-symbols-rounded text-on-surface/50" style="font-size:18px;">badge</span>
          <span class="text-sm text-on-surface/60">名前</span>
        </div>
        <span class="text-sm font-medium text-on-surface" th:text="${user.name}">名前</span>
      </div>


      <!-- メールアドレス -->
      <div class="flex items-center justify-between px-4 py-3.5">
        <div class="flex items-center gap-3">
          <span class="material-symbols-rounded text-on-surface/50" style="font-size:18px;">mail</span>
          <span class="text-sm text-on-surface/60">メールアドレス</span>
        </div>
        <span class="text-sm font-medium text-on-surface" th:text="${user.email}">email</span>
      </div>


      <!-- ロール -->
      <div class="flex items-center justify-between px-4 py-3.5">
        <div class="flex items-center gap-3">
          <span class="material-symbols-rounded text-on-surface/50" style="font-size:18px;">manage_accounts</span>
          <span class="text-sm text-on-surface/60">ロール</span>
        </div>
        <span class="text-sm font-medium px-3 py-1 rounded-full"
              th:classappend="${user.role == 'PARENT'} ? 'bg-primary/10 text-primary' :
                              (${user.role == 'PARTNER'} ? 'bg-secondary-container text-on-surface' :
                              (${user.role == 'CHILD'} ? 'bg-tertiary-container text-on-surface' : 'bg-surface-container-highest text-on-surface'))"
              th:text="${user.role == 'PARENT'} ? '親（PARENT）' :
                        (${user.role == 'PARTNER'} ? 'パートナー（PARTNER）' :
                        (${user.role == 'GRANDPARENT'} ? '祖父母（GRANDPARENT）' :
                        (${user.role == 'CHILD'} ? 'お子さん（CHILD）' : ${user.role})))">ロール</span>
      </div>


      <!-- ログイン方法 -->
      <div class="flex items-center justify-between px-4 py-3.5">
        <div class="flex items-center gap-3">
          <span class="material-symbols-rounded text-on-surface/50" style="font-size:18px;">login</span>
          <span class="text-sm text-on-surface/60">ログイン方法</span>
        </div>
        <span class="text-sm font-medium text-on-surface"
              th:text="${user.oauthProvider != null and !#strings.isEmpty(user.oauthProvider)} ? 'Google アカウント' : 'メールアドレス'">ログイン方法</span>
      </div>


      <!-- 登録日 -->
      <div class="flex items-center justify-between px-4 py-3.5">
        <div class="flex items-center gap-3">
          <span class="material-symbols-rounded text-on-surface/50" style="font-size:18px;">calendar_today</span>
          <span class="text-sm text-on-surface/60">登録日</span>
        </div>
        <span class="text-sm font-medium text-on-surface"
              th:text="${#temporals.format(user.createdAt, 'yyyy年M月d日')}">登録日</span>
      </div>
    </div>
  </div>

  <!-- ログアウト -->
  <div class="bg-surface-container-lowest rounded-2xl p-4 card-shadow">
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit"
              class="w-full flex items-center justify-center gap-2 py-3 rounded-full text-error font-semibold text-sm hover:bg-red-50 transition-colors">
        <span class="material-symbols-rounded" style="font-size:18px;">logout</span>
        ログアウト
      </button>
    </form>
  </div>

</main>

</body>
</html>
