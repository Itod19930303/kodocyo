<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/head :: head(${child.name} + ' の貯蓄')}"></head>
<body class="app-page font-sans">

<div th:replace="~{layout/nav :: navbar('family', ${user})}"></div>

<main class="max-w-5xl mx-auto px-4 md:px-6 py-6">

  <!-- 戻るリンク -->
  <a th:href="@{/family}" class="inline-flex items-center gap-1 text-sm text-on-surface/60 hover:text-primary transition-colors mb-5">
    <span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span>
    家族メンバーに戻る
  </a>

  <!-- 子供プロフィールヘッダー -->
  <div class="flex items-center gap-4 mb-6">
    <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl"
         th:style="'background-color:' + ${child.themeColor} + '22;'">
      <span th:text="${child.avatar}">🐣</span>
    </div>
    <div>
      <h1 class="font-display text-2xl font-bold text-on-surface" th:text="${child.name}">名前</h1>
      <span th:if="${gradeLabel != null and !gradeLabel.isEmpty()}"
            class="inline-block text-xs font-medium px-2.5 py-0.5 rounded-full bg-surface-container-low text-on-surface/70"
            th:text="${gradeLabel}">学年</span>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- 左メイン -->
    <div class="lg:col-span-2 space-y-6">

      <!-- 現在残高カード -->
      <div class="rounded-3xl p-6 card-shadow text-on-primary"
           th:style="'background: linear-gradient(135deg,' + ${child.themeColor} + ' 0%, ' + ${child.themeColor} + 'cc 100%);'">
        <p class="text-on-primary/70 text-sm font-medium mb-1">現在の残高</p>
        <p class="font-display text-4xl font-bold mb-4">
          ¥<span th:text="${#numbers.formatInteger(balance, 0, 'COMMA')}">0</span>
        </p>

        <!-- クイック操作ボタン -->
        <div th:if="${canEdit}" class="flex flex-wrap gap-2">
          <a th:href="@{/children/{id}/transactions/new(id=${child.id}, type='income')}"
             class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-white/25 hover:bg-white/35 text-on-primary text-sm font-semibold transition-colors">
            <span class="material-symbols-rounded" style="font-size:16px;">add</span>
            貯金する
          </a>
          <a th:href="@{/children/{id}/transactions/new(id=${child.id}, type='expense')}"
             class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-white/25 hover:bg-white/35 text-on-primary text-sm font-semibold transition-colors">
            <span class="material-symbols-rounded" style="font-size:16px;">remove</span>
            引き出す
          </a>
          <a th:href="@{/children/{id}/goals/new(id=${child.id})}"
             class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-white/25 hover:bg-white/35 text-on-primary text-sm font-semibold transition-colors">
            <span class="material-symbols-rounded" style="font-size:16px;">flag</span>
            目標追加
          </a>
        </div>
      </div>

      <!-- 貯蓄推移グラフ -->
      <div class="bg-surface-container-lowest rounded-2xl p-5 card-shadow">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-display font-bold text-on-surface">貯蓄推移</h3>
          <div class="flex gap-1">
            <button id="btn6months" onclick="loadChart('6months')"
                    class="px-3 py-1.5 rounded-full text-xs font-semibold bg-primary text-on-primary transition-colors">6ヶ月</button>
            <button id="btn1year" onclick="loadChart('1year')"
                    class="px-3 py-1.5 rounded-full text-xs font-semibold bg-surface-container-low text-on-surface transition-colors">1年</button>
          </div>
        </div>
        <div style="height: 200px;">
          <canvas id="lineChart"></canvas>
        </div>
      </div>

      <!-- 目標カード一覧 -->
      <div th:if="${!goals.isEmpty()}" class="bg-surface-container-lowest rounded-2xl p-5 card-shadow">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-display font-bold text-on-surface">目標</h3>
          <a th:href="@{/children/{id}/goals/new(id=${child.id})}"
             th:if="${canEdit}"
             class="text-sm text-primary font-semibold hover:underline flex items-center gap-0.5">
            <span class="material-symbols-rounded" style="font-size:14px;">add</span>
            追加
          </a>
        </div>
        <div class="space-y-4">
          <div th:each="goal : ${goals}" class="relative">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl bg-surface-container-low flex-shrink-0">
                <span th:text="${goal.emoji}">🎯</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <p class="font-semibold text-on-surface truncate" th:text="${goal.name}">目標名</p>
                  <span th:if="${achievedMap[goal.id]}"
                        class="flex-shrink-0 text-xs font-bold px-2 py-0.5 rounded-full bg-tertiary-container text-on-surface">
                    達成！
                  </span>
                </div>
                <div class="flex items-center justify-between text-xs text-on-surface/50 mb-1.5">
                  <span>¥<span th:text="${#numbers.formatInteger(balance, 0, 'COMMA')}">0</span> / ¥<span th:text="${#numbers.formatInteger(goal.targetAmount, 0, 'COMMA')}">0</span></span>
                  <span th:text="${achievementRates[goal.id]} + '%'">0%</span>
                </div>
                <div class="w-full bg-surface-container-low rounded-full h-2">
                  <div class="h-2 rounded-full transition-all"
                       th:style="'background-color:' + ${child.themeColor} + '; width:' + ${achievementRates[goal.id]} + '%;'"></div>
                </div>
                <p th:if="${goal.targetDate != null}"
                   class="text-xs text-on-surface/40 mt-1"
                   th:text="'目標日: ' + ${#temporals.format(goal.targetDate, 'yyyy年M月d日')}"></p>
              </div>
              <div th:if="${canEdit}" class="flex gap-1 flex-shrink-0">
                <a th:href="@{/children/{id}/goals/{goalId}/edit(id=${child.id}, goalId=${goal.id})}"
                   class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-surface-container-low text-on-surface/40 transition-colors">
                  <span class="material-symbols-rounded" style="font-size:14px;">edit</span>
                </a>
                <form th:action="@{/children/{id}/goals/{goalId}/delete(id=${child.id}, goalId=${goal.id})}" method="post" class="m-0">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-red-50 text-on-surface/40 hover:text-error transition-colors"
                          onclick="return confirm('目標を削除しますか？')">
                    <span class="material-symbols-rounded" style="font-size:14px;">delete</span>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 目標なし + 追加ボタン -->
      <div th:if="${goals.isEmpty() and canEdit}" class="bg-surface-container-lowest rounded-2xl p-5 card-shadow text-center">
        <span class="material-symbols-rounded text-on-surface/30 block mb-2" style="font-size:40px;">flag</span>
        <p class="text-sm text-on-surface/60 mb-3">まだ目標がありません</p>
        <a th:href="@{/children/{id}/goals/new(id=${child.id})}"
           class="inline-flex items-center gap-1.5 px-5 py-2 rounded-full bg-primary text-on-primary text-sm font-semibold hover:bg-primary-dim transition-colors">
          <span class="material-symbols-rounded" style="font-size:14px;">add</span>
          目標を設定する
        </a>
      </div>

    </div>

    <!-- 右サイドバー -->
    <div class="space-y-5">

      <!-- 月フィルター -->
      <div class="bg-surface-container-lowest rounded-2xl p-4 card-shadow">
        <h4 class="font-semibold text-on-surface text-sm mb-3">期間フィルター</h4>
        <div class="flex flex-wrap gap-2">
          <a th:href="@{/children/{id}(id=${child.id})}"
             th:classappend="${selectedYearMonth == null} ? 'bg-primary text-on-primary' : 'bg-surface-container-low text-on-surface hover:bg-surface-container-highest'"
             class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors">すべて</a>
          <a th:each="ym : ${yearMonths}"
             th:href="@{/children/{id}(id=${child.id}, yearMonth=${ym})}"
             th:classappend="${selectedYearMonth == ym} ? 'bg-primary text-on-primary' : 'bg-surface-container-low text-on-surface hover:bg-surface-container-highest'"
             class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors"
             th:text="${ym / 100 + '年' + ym % 100 + '月'}">年月</a>
        </div>
      </div>

      <!-- 入出金履歴 -->
      <div class="bg-surface-container-lowest rounded-2xl p-4 card-shadow">
        <h4 class="font-semibold text-on-surface text-sm mb-3">入出金履歴</h4>

        <div th:if="${transactions.isEmpty()}" class="text-center py-6">
          <span class="material-symbols-rounded text-on-surface/30 block mb-2" style="font-size:36px;">receipt_long</span>
          <p class="text-xs text-on-surface/50">履歴がありません</p>
        </div>

        <div class="space-y-2" th:unless="${transactions.isEmpty()}">
          <div th:each="tx : ${transactions}"
               class="flex items-center gap-2.5 p-2.5 rounded-xl hover:bg-surface-container-low transition-colors group">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
                 th:classappend="${tx.type == 'income'} ? 'bg-secondary-container' : 'bg-red-50'">
              <span class="material-symbols-rounded"
                    th:classappend="${tx.type == 'income'} ? 'text-emerald-700' : 'text-error'"
                    th:text="${tx.type == 'income'} ? 'arrow_downward' : 'arrow_upward'"
                    style="font-size:14px;">arrow_downward</span>
            </div>
            <div class="min-w-0 flex-1">
              <p class="text-xs font-medium text-on-surface truncate"
                 th:text="${tx.memo != null and !tx.memo.isBlank() ? tx.memo : (tx.type == 'income' ? (tx.category != null ? tx.category : '入金') : '出金')}">メモ</p>
              <p class="text-xs text-on-surface/40" th:text="${#temporals.format(tx.transactionDate, 'M月d日')}">日付</p>
            </div>
            <div class="flex items-center gap-1.5 flex-shrink-0">
              <p class="text-sm font-bold"
                 th:classappend="${tx.type == 'income'} ? 'text-emerald-700' : 'text-error'"
                 th:text="${(tx.type == 'income' ? '+' : '-') + '¥' + #numbers.formatInteger(tx.amount, 0, 'COMMA')}">+¥0</p>
              <form th:if="${canEdit}"
                    th:action="@{/children/{childId}/transactions/{txId}/delete(childId=${child.id}, txId=${tx.id})}"
                    method="post" class="m-0 opacity-0 group-hover:opacity-100 transition-opacity">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-50 text-on-surface/30 hover:text-error transition-colors"
                        onclick="return confirm('削除しますか？')">
                  <span class="material-symbols-rounded" style="font-size:12px;">close</span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script th:inline="javascript">
  const childId = /*[[${child.id}]]*/ 0;
  let lineChart = null;

  async function loadChart(period) {
    // ボタンスタイル切り替え
    document.getElementById('btn6months').className = period === '6months'
      ? 'px-3 py-1.5 rounded-full text-xs font-semibold bg-primary text-on-primary transition-colors'
      : 'px-3 py-1.5 rounded-full text-xs font-semibold bg-surface-container-low text-on-surface transition-colors';
    document.getElementById('btn1year').className = period === '1year'
      ? 'px-3 py-1.5 rounded-full text-xs font-semibold bg-primary text-on-primary transition-colors'
      : 'px-3 py-1.5 rounded-full text-xs font-semibold bg-surface-container-low text-on-surface transition-colors';

    const res = await fetch(`/children/${childId}/chart-data?period=${period}`);
    const chartData = await res.json();

    const ctx = document.getElementById('lineChart');
    if (lineChart) lineChart.destroy();

    lineChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.labels,
        datasets: [{
          data: chartData.data,
          borderColor: '#0060ad',
          backgroundColor: 'rgba(0,96,173,0.08)',
          borderWidth: 2.5,
          pointBackgroundColor: '#0060ad',
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.4,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => '¥' + ctx.raw.toLocaleString()
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#173355', font: { size: 11 } },
            border: { display: false }
          },
          y: {
            grid: { color: 'rgba(23,51,85,0.06)' },
            ticks: {
              color: '#173355', font: { size: 11 },
              callback: (v) => '¥' + v.toLocaleString()
            },
            border: { display: false }
          }
        }
      }
    });
  }

  loadChart('6months');
</script>
</body>
</html>
