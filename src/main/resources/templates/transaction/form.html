<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="(${transactionForm.type == 'income'} ? '入金登録' : '出金登録') + ' - こどちょ'">入出金登録 - こどちょ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0060ad', 'primary-dim': '#005498',
            'on-primary': '#f8f8ff', surface: '#f8f9ff',
            'surface-container-low': '#eff3ff',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#d4e3ff',
            'on-surface': '#173355',
            'secondary-container': '#b1fde6',
            'tertiary-container': '#feb246',
            error: '#ac3434',
          },
          fontFamily: {
            sans: ['Manrope', 'Noto Sans JP', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-style: normal; font-size: 20px; line-height: 1; letter-spacing: normal; text-transform: none; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
    body { padding-bottom: 72px; background-color: #f8f9ff; color: #173355; }
    @media (min-width: 768px) { body { padding-bottom: 0; } }
    .card-shadow { box-shadow: 0 2px 16px rgba(0,96,173,0.08); }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .type-tab.active { background-color: #0060ad; color: #f8f8ff; }
    .type-tab { background-color: #eff3ff; color: #173355; }
    .category-chip.selected { background-color: #0060ad; color: #f8f8ff; }
  </style>
</head>
<body class="font-sans">

<div th:replace="~{layout/nav :: navbar('family', ${user})}"></div>

<main class="max-w-5xl mx-auto px-4 md:px-6 py-6">

  <!-- 戻るリンク -->
  <a th:href="@{/children/{id}(id=${child.id})}" class="inline-flex items-center gap-1 text-sm text-on-surface/60 hover:text-primary transition-colors mb-5">
    <span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span>
    <span th:text="${child.name} + 'に戻る'">戻る</span>
  </a>

  <!-- 子供ヘッダー -->
  <div class="flex items-center gap-3 mb-6">
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl"
         th:style="'background-color:' + ${child.themeColor} + '22;'">
      <span th:text="${child.avatar}">🐣</span>
    </div>
    <div>
      <h1 class="font-display text-xl font-bold text-on-surface"
          th:text="${transactionForm.type == 'income'} ? ${child.name} + ' に入金' : ${child.name} + ' から出金'">入出金</h1>
      <p class="text-sm text-on-surface/60">現在の残高: ¥<span th:text="${#numbers.formatInteger(balance, 0, 'COMMA')}">0</span></p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

    <!-- 左：フォーム（3/5幅） -->
    <div class="lg:col-span-3">
      <div class="bg-surface-container-lowest rounded-3xl p-6 card-shadow">

        <form th:action="@{/children/{id}/transactions(id=${child.id})}" method="post" id="txForm">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <!-- 入出金タブ -->
          <div class="flex gap-2 mb-6">
            <button type="button" id="tabIncome"
                    th:classappend="${transactionForm.type == 'income'} ? 'active' : ''"
                    class="type-tab flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full font-semibold text-sm transition-colors"
                    onclick="setType('income')">
              <span class="material-symbols-rounded" style="font-size:16px;">arrow_downward</span>
              入金
            </button>
            <button type="button" id="tabExpense"
                    th:classappend="${transactionForm.type == 'expense'} ? 'active' : ''"
                    class="type-tab flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full font-semibold text-sm transition-colors"
                    onclick="setType('expense')">
              <span class="material-symbols-rounded" style="font-size:16px;">arrow_upward</span>
              出金
            </button>
          </div>
          <input type="hidden" id="typeInput" name="type" th:value="${transactionForm.type}"/>

          <!-- 金額（大きなヒーロー入力） -->
          <div class="mb-6">
            <label class="block text-xs font-semibold text-on-surface/60 mb-2">金額</label>
            <div class="flex items-center gap-2 bg-surface-container-low rounded-2xl px-4 py-3">
              <span class="text-2xl font-bold text-on-surface/40">¥</span>
              <input type="number" id="amount" name="amount"
                     th:value="${transactionForm.amount}"
                     class="flex-1 text-4xl font-display font-bold text-on-surface bg-transparent outline-none"
                     placeholder="0" min="1" required>
            </div>
            <p th:if="${#fields.hasErrors('amount')}" class="text-xs text-error mt-1" th:errors="*{amount}">エラー</p>
            <!-- クイック金額ボタン -->
            <div class="flex gap-2 mt-2 flex-wrap">
              <button type="button" onclick="addAmount(100)" class="px-3 py-1 rounded-full text-xs font-semibold bg-surface-container-low hover:bg-surface-container-highest text-on-surface transition-colors">+¥100</button>
              <button type="button" onclick="addAmount(500)" class="px-3 py-1 rounded-full text-xs font-semibold bg-surface-container-low hover:bg-surface-container-highest text-on-surface transition-colors">+¥500</button>
              <button type="button" onclick="addAmount(1000)" class="px-3 py-1 rounded-full text-xs font-semibold bg-surface-container-low hover:bg-surface-container-highest text-on-surface transition-colors">+¥1,000</button>
              <button type="button" onclick="addAmount(3000)" class="px-3 py-1 rounded-full text-xs font-semibold bg-surface-container-low hover:bg-surface-container-highest text-on-surface transition-colors">+¥3,000</button>
              <button type="button" onclick="addAmount(5000)" class="px-3 py-1 rounded-full text-xs font-semibold bg-surface-container-low hover:bg-surface-container-highest text-on-surface transition-colors">+¥5,000</button>
            </div>
          </div>

          <!-- カテゴリ（入金時のみ） -->
          <div id="categorySection" class="mb-6" th:classappend="${transactionForm.type == 'expense'} ? 'hidden' : ''">
            <label class="block text-xs font-semibold text-on-surface/60 mb-2">カテゴリ</label>
            <div class="flex flex-wrap gap-2">
              <button type="button" onclick="selectCategory('allowance')"
                      th:classappend="${transactionForm.category == 'allowance'} ? 'selected' : 'bg-surface-container-low text-on-surface'"
                      class="category-chip px-4 py-2 rounded-full text-sm font-medium transition-colors">
                おこづかい
              </button>
              <button type="button" onclick="selectCategory('earned')"
                      th:classappend="${transactionForm.category == 'earned'} ? 'selected' : 'bg-surface-container-low text-on-surface'"
                      class="category-chip px-4 py-2 rounded-full text-sm font-medium transition-colors">
                おてつだい
              </button>
              <button type="button" onclick="selectCategory('new_year')"
                      th:classappend="${transactionForm.category == 'new_year'} ? 'selected' : 'bg-surface-container-low text-on-surface'"
                      class="category-chip px-4 py-2 rounded-full text-sm font-medium transition-colors">
                お年玉
              </button>
              <button type="button" onclick="selectCategory('other')"
                      th:classappend="${transactionForm.category == 'other'} ? 'selected' : 'bg-surface-container-low text-on-surface'"
                      class="category-chip px-4 py-2 rounded-full text-sm font-medium transition-colors">
                その他
              </button>
            </div>
            <input type="hidden" id="categoryInput" name="category" th:value="${transactionForm.category}"/>
          </div>

          <!-- 日付 -->
          <div class="mb-4">
            <label for="transactionDate" class="block text-xs font-semibold text-on-surface/60 mb-2">日付</label>
            <input type="date" id="transactionDate" name="transactionDate"
                   th:value="${transactionForm.transactionDate}"
                   class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface outline-none focus:ring-2 focus:ring-primary/30 transition-all font-medium"
                   required>
            <p th:if="${#fields.hasErrors('transactionDate')}" class="text-xs text-error mt-1" th:errors="*{transactionDate}">エラー</p>
          </div>

          <!-- メモ -->
          <div class="mb-6">
            <label for="memo" class="block text-xs font-semibold text-on-surface/60 mb-2">メモ（任意）</label>
            <input type="text" id="memo" name="memo"
                   th:value="${transactionForm.memo}"
                   class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface outline-none focus:ring-2 focus:ring-primary/30 transition-all"
                   placeholder="例：2月のおこづかい" maxlength="100">
          </div>

          <!-- 送信ボタン -->
          <button type="submit"
                  class="w-full flex items-center justify-center gap-2 py-3.5 rounded-full bg-primary text-on-primary font-bold text-base hover:bg-primary-dim transition-colors">
            <span class="material-symbols-rounded" style="font-size:18px;">check</span>
            <span id="submitLabel" th:text="${transactionForm.type == 'income'} ? '入金を記録する' : '出金を記録する'">記録する</span>
          </button>
        </form>
      </div>
    </div>

    <!-- 右：情報パネル（2/5幅） -->
    <div class="lg:col-span-2 space-y-4">

      <!-- 目標進捗 -->
      <div th:if="${!goals.isEmpty()}" class="bg-surface-container-lowest rounded-2xl p-5 card-shadow">
        <h4 class="font-semibold text-on-surface mb-3">目標進捗</h4>
        <div class="space-y-3">
          <div th:each="goal, iterStat : ${goals}" th:if="${iterStat.index < 3}">
            <div class="flex items-center gap-2 mb-1">
              <span th:text="${goal.emoji}" class="text-sm">🎯</span>
              <span class="text-xs font-medium text-on-surface truncate flex-1" th:text="${goal.name}">目標</span>
              <span class="text-xs text-on-surface/50">¥<span th:text="${#numbers.formatInteger(goal.targetAmount, 0, 'COMMA')}">0</span></span>
            </div>
            <div class="w-full bg-surface-container-low rounded-full h-1.5">
              <div class="h-1.5 rounded-full"
                   th:style="'background-color:' + ${child.themeColor} + '; width:' + ${T(java.lang.Math).min(100, (int)(balance * 100.0 / goal.targetAmount))} + '%;'"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- こどちょ Philosophy -->
      <div class="bg-surface-container-highest rounded-2xl p-5 card-shadow">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-rounded text-primary" style="font-size:20px;">auto_stories</span>
          <h4 class="font-semibold text-on-surface text-sm">こどちょ Philosophy</h4>
        </div>
        <p class="text-xs text-on-surface/70 leading-relaxed">
          お金の大切さを子供の頃から学ぶことで、将来の金融リテラシーが育ちます。
          一緒に目標を立て、コツコツ貯める喜びを体験させてあげましょう。
        </p>
      </div>

    </div>
  </div>
</main>

<script th:inline="javascript">
  function setType(type) {
    document.getElementById('typeInput').value = type;
    document.getElementById('categorySection').classList.toggle('hidden', type !== 'income');
    document.getElementById('tabIncome').className = type === 'income'
      ? 'type-tab active flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full font-semibold text-sm transition-colors'
      : 'type-tab flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full font-semibold text-sm transition-colors';
    document.getElementById('tabExpense').className = type === 'expense'
      ? 'type-tab active flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full font-semibold text-sm transition-colors'
      : 'type-tab flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full font-semibold text-sm transition-colors';
    document.getElementById('submitLabel').textContent = type === 'income' ? '入金を記録する' : '出金を記録する';
  }

  function selectCategory(cat) {
    document.getElementById('categoryInput').value = cat;
    document.querySelectorAll('.category-chip').forEach(btn => {
      btn.classList.remove('selected');
      btn.classList.add('bg-surface-container-low', 'text-on-surface');
    });
    event.target.classList.add('selected');
    event.target.classList.remove('bg-surface-container-low', 'text-on-surface');
  }

  function addAmount(v) {
    const inp = document.getElementById('amount');
    inp.value = (parseInt(inp.value) || 0) + v;
  }
</script>
</body>
</html>
